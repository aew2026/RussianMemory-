  <!-- Folded corner -->
  <polygon points="310,80 370,80 370,140" fill="#ddd0f5"/>
  <polygon points="310,80 370,140 310,140" fill="#ede5fa"/>

  <!-- Lyric lines -->
  <rect x="145" y="155" width="160" height="14" rx="7" fill="#c084fc"/>
  <rect x="145" y="190" width="190" height="14" rx="7" fill="#ddd0f5"/>
  <rect x="145" y="225" width="140" height="14" rx="7" fill="#ddd0f5"/>
  <rect x="145" y="270" width="170" height="14" rx="7" fill="#c084fc"/>
  <rect x="145" y="305" width="190" height="14" rx="7" fill="#ddd0f5"/>
  <rect x="145" y="340" width="120" height="14" rx="7" fill="#ddd0f5"/>

  <!-- Music note -->
  <ellipse cx="355" cy="385" rx="22" ry="16" fill="#7c4dbe"/>
  <rect x="375" y="310" width="12" height="77" rx="6" fill="#7c4dbe"/>
  <rect x="375" y="310" width="44" height="12" rx="6" fill="#7c4dbe"/>
</svg>
